bibliographic:
  title: You Are Standing
  author: Aaron A. Reed
  headline: A compact parser work about the changing shapes of text games.
  first_published: '2023'
  genre: Parser
  language: en
  description: |
    **You Are Standing** is a compact Z-code work by Aaron A. Reed, created as a bonus game for the *50 Years of Text Games* Ultimate Collector's Edition.

    The piece moves through several eras of text-game style while staying small enough for vintage-friendly distribution. This TerpVault starter package uses generated placeholder artwork and curator-created helper notes; the bundled story file remains the original game artifact.

