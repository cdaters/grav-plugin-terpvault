description: |
  **Adventure**, also known as **Colossal Cave Adventure** or **ADVENT**, is the cave where interactive fiction found its voice. In this Z-machine build, you explore a mysterious underground world with typed commands, a brass lamp, a limited inventory, strange passages, treasures, hazards, magic words, and puzzles that reward careful mapping.

  It is old-school, occasionally stubborn, and historically enormous: before *Zork*, before Sierra adventures, before modern story games, there was a locked grate, a dark cave, and the irresistible urge to type `ENTER`.

