enabled: true

# Public library base route. TerpVault can render virtual pages under this route.
route: /if

# Enable automatic virtual pages for library, detail, and play views.
auto_routes: true

library:
  title: Interactive Fiction Library
  intro: >
    A curated shelf of playable interactive fiction, parser adventures, and digital story worlds.
  show_unpublished: false
  cards_per_row: 3

player:
  engine: parchment
  # Leave blank to use the bundled local Parchment build. Set this only if you
  # want to use a separately hosted Parchment index URL.
  parchment_url: ''
  theme: retro-terminal
  allow_fullscreen: true
  # button keeps Parchment's launch screen; autostart is reserved for future adapter support.
  launch_mode: button
  allow_download_saves: true
  allow_upload_saves: true
  autosave: true

storage:
  games_path: user://data/terpvault/games

security:
  allowed_story_extensions:
    - z1
    - z2
    - z3
    - z4
    - z5
    - z6
    - z7
    - z8
    - zblorb
    - zlb
    - ulx
    - gblorb
    - glb
    - blorb
    - hex
    - gam
    - t3
    - taf
  allowed_asset_extensions:
    - jpg
    - jpeg
    - png
    - webp
    - gif
    - svg
    - md
    - txt

admin:
  # Experimental Admin2 Library Manager. Disabled by default so public virtual
  # routes stay separate from Admin2 dashboard/API request lifecycles.
  enable_admin2_page: false

validation:
  warn_missing_ifid: true
  warn_missing_license: true
  warn_missing_source: true
  warn_missing_help_files: true
