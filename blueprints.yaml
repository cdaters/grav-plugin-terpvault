name: TerpVault
slug: terpvault
type: plugin
version: 0.4.8
description: "Curate, manage, import/export, and play interactive fiction story packages in Grav."
icon: book-open
author:
  name: Craig Daters / RetroRealm
  email: craig@daters.net
homepage: https://github.com/cdaters/grav-plugin-terpvault
demo: https://retrorealm.org
keywords: grav, plugin, interactive fiction, parser fiction, zcode, glulx, tads, parchment, retro, games
bugs: https://github.com/cdaters/grav-plugin-terpvault/issues
license: MIT

compatibility:
  grav:
    - '2.0'

dependencies:
  - { name: grav, version: '>=2.0.0-rc.2' }
  - { name: admin2, version: '>=2.0.0-rc.8' }
  - { name: api, version: '>=1.0.0-rc.8' }

form:
  validation: loose
  fields:
    enabled:
      type: toggle
      label: Plugin Enabled
      highlight: 1
      default: 1
      options:
        1: 'Enabled'
        0: 'Disabled'
      validate:
        type: bool

    route:
      type: text
      label: Library Route
      help: Base route for TerpVault virtual pages, such as /if.
      default: /if

    auto_routes:
      type: toggle
      label: Enable Virtual Routes
      help: Render TerpVault library/detail/play pages without creating Grav pages.
      highlight: 1
      default: 1
      options:
        1: 'Enabled'
        0: 'Disabled'
      validate:
        type: bool

    library.title:
      type: text
      label: Library Title
      default: Interactive Fiction Library

    library.intro:
      type: textarea
      label: Library Intro
      rows: 4

    library.show_unpublished:
      type: toggle
      label: Show Unpublished Games
      help: Useful during development. Keep disabled on public sites.
      highlight: 0
      default: 0
      options:
        1: 'Yes'
        0: 'No'
      validate:
        type: bool

    player.engine:
      type: select
      label: Player Engine
      default: parchment
      options:
        parchment: Parchment Adapter
        custom: Custom / Future Adapter

    player.parchment_url:
      type: text
      label: Parchment URL
      help: Optional URL to a hosted Parchment index page. Leave blank to use the bundled local Parchment adapter.

    player.theme:
      type: select
      label: Player Theme
      default: retro-terminal
      options:
        retro-terminal: Retro Terminal
        parchment: Parchment Paper
        clean: Clean

    player.allow_fullscreen:
      type: toggle
      label: Allow Fullscreen Player
      highlight: 1
      default: 1
      options:
        1: 'Yes'
        0: 'No'
      validate:
        type: bool

    storage.games_path:
      type: text
      label: Games Storage Path
      help: Stream path where game package directories live.
      default: user://data/terpvault/games

    admin.enable_admin2_page:
      type: toggle
      label: Enable Admin2 Library Manager
      help: Experimental Admin2 Library Manager. Enables authenticated package create/edit/export/import workflows; leave disabled unless testing Admin2/API integration.
      highlight: 0
      default: 0
      options:
        1: 'Yes'
        0: 'No'
      validate:
        type: bool
